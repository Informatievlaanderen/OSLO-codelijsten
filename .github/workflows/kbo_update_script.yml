# .github/workflows/kbo-update.yml
name: Apply KBO Update

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - KBO-codes
jobs:
  apply-kbo-update:
    runs-on: ubuntu-latest
    environment: KBO # Github secrets environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: KBO-codes

      - name: Test SFTP connectivity
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          echo "--- Port check ---"
          timeout 10 bash -c "echo > /dev/tcp/$FTP_HOST/$FTP_PORT" && echo "Port $FTP_PORT reachable" || echo "Port $FTP_PORT blocked"

          echo "--- SSH banner check ---"
          timeout 10 ssh-keyscan -p "$FTP_PORT" "$FTP_HOST" 2>&1 || echo "SSH handshake failed"

          echo "--- Runner IP ---"
          curl -s ifconfig.me

      - name: Download from SFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_UPDATE_PATH: ${{ secrets.FTP_UPDATE_PATH }}
          FTP_FULL_PATH: ${{ secrets.FTP_FULL_PATH }}
        run: |
          echo $FTP_PORT
          sshpass -p "$FTP_PASSWORD" sftp -P 22 ftp.DylanVanAssche@ftps.economie.fgov.be <<EOF
          get /home/ftp.DylanVanAssche/KboOpenData_0311_2026_03_25_Update.zip /tmp/kbo-update.zip
          bye
          EOF

      - name: Run update script
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_UPDATE_PATH: ${{ secrets.FTP_UPDATE_PATH }}
          FTP_FULL_PATH: ${{ secrets.FTP_FULL_PATH }}
        run: |
          chmod +x scripts/apply-kbo-update.sh
          ./scripts/apply-kbo-update.sh
