version: 2.1
jobs:
  build:
    docker:
      - image: 'cimg/node:22.22.0'
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            npm ci
            npm run build
  apply-kbo-update:
    docker:
      - image: 'cimg/node:22.22.0'
    steps:
      - checkout

      - add_ssh_keys:
          fingerprints:
            - 'SHA256:8pdCUeEZ0d+VSWD6z88QTfUn94Iy3NjsmjZ1fjyX5Yk'

      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y lftp git unzip

      - run:
          name: Configure Git
          command: |
            git config --global user.name "OSLO-support"
            git config --global user.email "OSLO-support@vlaanderen.be"

      - run:
          name: Install KBO converter
          command: sudo npm install -g @oslo-flanders/kbo-to-ttl-converter

      - run:
          name: Apply KBO daily update
          command: ./scripts/apply-kbo-update.sh
          no_output_timeout: 60m

workflows:
  version: 2
  apply-kbo-update-daily:
    triggers:
      - schedule:
          cron: 0 3 * * *
          filters:
            branches:
              only:
                - main
    jobs:
      - apply-kbo-update:
          context: kbo-converter
